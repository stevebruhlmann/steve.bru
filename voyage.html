<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Titre dynamique : mis à jour par voyage.js selon l'id dans l'URL -->
  <title>Voyage – steve.bru</title>

  <!-- Polices (identiques au reste du site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <!-- Styles globaux du site -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Styles communs pages secondaires (navbar fix, fil d'Ariane...) -->
  <link rel="stylesheet" href="css/page.css">

  <!-- Styles spécifiques à la page voyage (galerie, lightbox) -->
  <link rel="stylesheet" href="css/voyage.css">
</head>

<body class="page-secondary">

  <!-- Navbar centralisée — injectée par navbar.js via fetch() -->
  <div id="navbar-container"></div>

<!-- ══════════════════════════════════════════════════════
       CONTENU PRINCIPAL
       Template générique : sert n'importe quel voyage selon l'id
       passé dans l'URL — voyage.html?id=[id-du-voyage]
       (ex. de format : pays-AAAAMM). Tout le contenu est généré
       dynamiquement par voyage.js depuis VOYAGES_DATA.
  ══════════════════════════════════════════════════════ -->
  <main id="page-content">

    <!-- Hero pleine largeur (full-bleed) — photo de couverture + titre & badges
         en surimpression. Généré par voyage.js (renderHero) à partir du champ
         `cover` du voyage. Se place sous le fil d'Ariane (injecté par navbar.js). -->
    <div id="voyage-hero"></div>

    <!-- En-tête du voyage (meta, étapes, intro).
         Le titre et les badges sont désormais affichés dans le hero ci-dessus. -->
    <div id="voyage-header"></div>

    <!-- Galerie masonry de toutes les photos du voyage -->
    <div id="voyage-galerie"></div>

  </main>

  <!-- ══════════════════════════════════════════════════════
       LIGHTBOX — superposition plein écran au clic d'une photo
  ══════════════════════════════════════════════════════ -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Photo en plein écran">
    <div class="lightbox__backdrop" id="lightbox-backdrop"></div>
    <div class="lightbox__frame">
      <button class="lightbox__close" id="lightbox-close" aria-label="Fermer">×</button>
      <img class="lightbox__img" id="lightbox-img" src="" alt="">
      <button class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" aria-label="Photo précédente">‹</button>
      <button class="lightbox__nav lightbox__nav--next" id="lightbox-next" aria-label="Photo suivante">›</button>
      <div class="lightbox__counter" id="lightbox-counter"></div>
    </div>
  </div>

<!-- ══════════════════════════════════════════════════════
       SCRIPTS — ordre important :
         1. navbar.js        → navbar + fil d'Ariane
         2. imagesloaded.js  → attend le chargement des images
         3. masonry.js       → layout masonry
         4. voyages_data.js  → VOYAGES_DATA (source unique)
         5. voyages.js       → carte D3 + grille
         6. voyage.js        → rendu + lightbox
  ══════════════════════════════════════════════════════ -->
  <script src="js/navbar.js"></script>
<!-- Librairies masonry — hébergées localement -->
<script src="js/vendor/imagesloaded.pkgd.min.js"></script>
<script src="js/vendor/masonry.pkgd.min.js"></script>
<!-- voyages_data.js doit être chargé AVANT voyages.js et voyage.js -->
<script src="js/voyages_data.js"></script>
<script src="js/voyages.js"></script>
<script src="js/voyage.js"></script>

</body>
</html>
