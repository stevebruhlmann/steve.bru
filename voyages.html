<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voyages — steve.bru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/page.css">
  <link rel="stylesheet" href="css/voyages.css">
</head>
<body class="page-secondary">

   <!-- ══════════════════════════════════════════════
       NAVBAR - chargée via fetch() depuis components/navbar.html
  ══════════════════════════════════════════════ -->
<div id="navbar-container"></div>

  <!-- ══════════════════════════════════════════════
       CONTENU PRINCIPAL
  ══════════════════════════════════════════════ -->
  <main id="page-content">

    <!-- ── EN-TÊTE DE PAGE ── -->
    <header class="page-header">
      <h1 class="section-title">Voyages 8</h1>
      <p class="page-subtitle"></p>
      <p class="page-body"></p>

      <!-- Statistiques globales -->
      <div class="voyages-stats">
        <div class="stat-item">
          <span class="stat-number" data-stat="voyages">0</span>
          <span class="stat-label">Voyages</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-stat="a-venir">0</span>
          <span class="stat-label">à venir</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-stat="pays">0</span>
          <span class="stat-label">Pays</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-stat="continents">0</span>
          <span class="stat-label">Continents</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" data-stat="km">0</span>
          <span class="stat-label">
            Km.
            <span class="stat-info" aria-label="À vol d'oiseau depuis Genève — formule haversine">ⓘ
              <span class="stat-tooltip">Distance à vol d'oiseau depuis Genève — estimation haversine</span>
            </span>
          </span>
        </div>
      </div>
    </header>


    <!-- ══════════════════════════════════════════════
         CARTE INTERACTIVE D3.js
         Points par pays · clic → pop-up avec liste des voyages
         Pop-up → scroll vers la carte du voyage dans la grille
    ══════════════════════════════════════════════ -->
    <section class="map-section" id="map-section">
      <div class="map-label">
        <span></span>
      </div>

      <!-- Conteneur SVG — D3 dessine ici -->
      <div id="world-map" role="img" aria-label="Carte mondiale des voyages de steve.bru"></div>

      <!-- Pop-up carte — positionnée par JS -->
      <div class="map-popup" id="map-popup" aria-live="polite">
        <div class="map-popup-flag" id="popup-flag"></div>
        <div class="map-popup-country" id="popup-country"></div>
        <ul class="map-popup-trips" id="popup-trips"></ul>
      </div>
    </section>


    <!-- ══════════════════════════════════════════════
         GRILLE DES VOYAGES
         Une carte par pays (regroupés si plusieurs voyages)
         Carrousel de 1-5 photos par carte
         Clic sur une photo → page dédiée du voyage
    ══════════════════════════════════════════════ -->
    <section class="voyages-grid-section" id="voyages-grid">
      <div class="voyages-grid" id="voyages-grid-container">

        <!-- ── Les cartes sont générées par JS depuis VOYAGES_DATA ── -->
        <!-- Voir voyages.js : fonction renderVoyagesGrid() -->

      </div>
    </section>

  </main>


  <!-- ── FOOTER ── -->
  <footer id="site-footer">
    <span>© 2026 steve.bru</span>
  </footer>


  <!-- ══════════════════════════════════════════════
       SCRIPTS
       Ordre important :
       1. D3.js      → librairie carte
       2. TopoJSON   → données géographiques (format compressé)
       3. voyages.js → logique spécifique à cette page
  ══════════════════════════════════════════════ -->
  <script src="js/navbar.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <!-- voyages_data.js doit être chargé AVANT voyages.js -->
  <script src="js/voyages_data.js"></script>
  <script src="js/voyages.js"></script>

</body>
</html>
